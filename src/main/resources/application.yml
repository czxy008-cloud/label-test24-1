server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: course-tracker

  datasource:
    url: jdbc:postgresql://localhost:5432/course_tracker
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  sql:
    init:
      mode: always
      schema-locations: classpath:sql/schema.sql

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.learning.coursetracker.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

jwt:
  secret: course-tracker-secret-key-for-jwt-token-generation-2024
  expiration: 86400000

logging:
  level:
    com.learning.coursetracker: DEBUG
    org.mybatis: DEBUG
